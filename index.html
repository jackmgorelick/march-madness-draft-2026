<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #9ca3af;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
    padding: 24px 32px;
    border-bottom: 2px solid var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .header-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .live-indicator {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 600;
    cursor: pointer; user-select: none;
    transition: all 0.2s;
  }
  .live-indicator.active {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
  }
  .live-indicator.inactive {
    background: rgba(239,68,68,0.1);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.2);
  }
  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    animation: pulse 2s infinite;
  }
  .live-indicator.active .live-dot { background: var(--green); }
  .live-indicator.inactive .live-dot { background: var(--red); animation: none; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  @keyframes liveBorder {
    0%, 100% { border-color: var(--green); }
    50% { border-color: transparent; }
  }
  .tab-bar {
    display: flex;
    gap: 4px;
    padding: 8px 32px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { background: #2a2d3a; color: var(--text); }
  .tab.active { background: var(--accent); color: white; }
  .container { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card-live {
    border-color: var(--green);
    animation: liveBorder 2s infinite;
  }
  .card h2 { font-size: 18px; margin-bottom: 16px; font-weight: 700; }
  .card h3 { font-size: 15px; margin-bottom: 12px; color: var(--muted); font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  td { padding: 8px 10px; border-bottom: 1px solid #1f2233; }
  tr:hover td { background: rgba(99, 102, 241, 0.05); }
  .rank { font-weight: 700; color: var(--accent); width: 30px; }
  .pts { font-weight: 700; font-variant-numeric: tabular-nums; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-active { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-eliminated { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-live { background: rgba(34,197,94,0.2); color: var(--green); animation: pulse 2s infinite; }
  .badge-final { background: rgba(99,102,241,0.15); color: var(--accent); }
  .badge-upcoming { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .stat-label { color: var(--muted); font-size: 13px; }
  .stat-value { font-weight: 700; font-size: 18px; }
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;

  .btn:hover { border-color: var(--accent); background: #2a2d3a; }
  .btn-primary { background: var(--accent); border-color: var(--accent); }
  .btn-primary:hover { background: #4f46e5; }
  .btn-danger { border-color: var(--red); color: var(--red); }

  input[type="number"] {

    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    text-align: center;

  input[type="number"]:focus { outline: none; border-color: var(--accent); }
  .search-input {

    background: var(--bg);
    color: var(--text);
    font-size: 14px;

  .bar-chart { display: flex; flex-direction: column; gap: 8px; }
  .bar-row { display: flex; align-items: center; gap: 10px; }
  .bar-label { width: 140px; font-size: 13px; font-weight: 500; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 24px; background: #1f2233; border-radius: 4px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; padding-left: 8px; font-size: 11px; font-weight: 700; min-width: fit-content; }
  .modal-overlay {

    z-index: 100;

    align-items: center;

  .modal {

  .round-selector { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

// 2026 NCAA Tournament date→round mapping

  '2026-03-18': 1, '2026-03-19': 1, // First Four (count as R64)
  '2026-03-20': 1, '2026-03-21': 1, // Round of 64
  '2026-03-22': 2, '2026-03-23': 2, // Round of 32
  '2026-03-27': 3, '2026-03-28': 3, // Sweet 16
  '2026-03-29': 4, '2026-03-30': 4, // Elite 8
  '2026-04-05': 5,                   // Final Four
  '2026-04-07': 6,                   // Championship
};

// Detect round from ESPN event data
function detectRound(event, competition) {
  // Try notes first (e.g. "First Round - East Region")
  const notes = competition?.notes || event?.competitions?.[0]?.notes || [];
  for (const note of notes) {
    const h = (note.headline || '').toLowerCase();
    if (h.includes('first four')) return 1;
    if (h.includes('first round')) return 1;
    if (h.includes('second round')) return 2;
    if (h.includes('sweet 16') || h.includes('regional semifinal')) return 3;
    if (h.includes('elite eight') || h.includes('elite 8') || h.includes('regional final')) return 4;
    if (h.includes('final four') || h.includes('national semifinal')) return 5;
    if (h.includes('championship') || h.includes('national final')) return 6;
  }
  // Fallback to date mapping
  const dateStr = event?.date?.slice(0, 10) || '';
  if (DATE_TO_ROUND[dateStr]) return DATE_TO_ROUND[dateStr];
  // Last resort: use state.currentRound
  return state.currentRound;
}

}

      const parsed = JSON.parse(saved);
      if (parsed.teams) return parsed;
    }
  } catch(e) {}
  return getDefaultState();
}

function saveState() {
  localStorage.setItem('mm_draft_2026', JSON.stringify(state));
}

function getPlayerScore(playerName, round) {
  if (!state.scores[playerName]) return 0;
  if (round) return state.scores[playerName][round] || 0;
  return Object.values(state.scores[playerName]).reduce((a,b) => a + b, 0);
}

function getTeamScore(team) {
  return team.players.reduce((sum, p) => sum + getPlayerScore(p.name), 0);
}

function isEliminated(college) {
  return !!state.eliminated[college];
}

function isPlayerEliminated(player) {
  return isEliminated(player.college);
}

function getActivePlayers(team) {
  return team.players.filter(p => !isPlayerEliminated(p));
}

function getAllColleges() {
  const colleges = new Set();
  state.teams.forEach(t => t.players.forEach(p => colleges.add(p.college)));
  return [...colleges].sort();
}

function getTopScorers() {
  const all = [];
  state.teams.forEach((t,ti) => {
    t.players.forEach(p => {
      all.push({ ...p, teamName: t.name, teamIdx: ti, totalPts: getPlayerScore(p.name) });
    });
  });
  return all.sort((a,b) => b.totalPts - a.totalPts);
}

// ===== ESPN LIVE API =====
const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard';
const ESPN_SUMMARY = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/summary';

// Get all drafted college names
function getDraftedColleges() {
  const colleges = new Set();
  state.teams.forEach(t => t.players.forEach(p => colleges.add(p.college)));
  return colleges;
}

// Match ESPN team to our draft college using EXACT location match (no more includes!)
function matchESPNTeam(espnTeam) {
  const loc = (espnTeam.team?.location || '').toLowerCase().trim();
  const abbr = (espnTeam.team?.abbreviation || '').toLowerCase().trim();

  // Try exact location match first (most reliable)
  if (ESPN_LOCATION_TO_DRAFT[loc]) return ESPN_LOCATION_TO_DRAFT[loc];

  // Fallback to abbreviation
  if (ESPN_ABBR_TO_DRAFT[abbr]) return ESPN_ABBR_TO_DRAFT[abbr];

  return null;
}

// Normalize player name for fuzzy matching
function normalizeName(name) {
  return name.toLowerCase()
    .replace(/[^a-z\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

// Simple Levenshtein edit distance
function editDistance(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
  return dp[m][n];
}

// Check if two names likely refer to the same player
function namesMatch(draftName, espnName) {
  // Check explicit aliases first
  const alias = NAME_ALIASES[draftName];
  if (alias && normalizeName(alias) === normalizeName(espnName)) return true;

  const dn = normalizeName(draftName);
  const en = normalizeName(espnName);
  if (dn === en) return true;

  // Strip "jr", "ii", "iii", "iv" suffixes for comparison
  const suffixes = ['jr', 'sr', 'ii', 'iii', 'iv'];
  const dParts = dn.split(' ').filter(p => !suffixes.includes(p));
  const eParts = en.split(' ').filter(p => !suffixes.includes(p));

  if (dParts.length >= 2 && eParts.length >= 2) {
    const dLast = dParts[dParts.length - 1];
    const eLast = eParts[eParts.length - 1];
    const dFirst = dParts[0];
    const eFirst = eParts[0];

    // Exact last name match + close first name (edit distance <= 2)
    if (dLast === eLast && editDistance(dFirst, eFirst) <= 2) return true;

    // Close last name (edit distance <= 1) + close first name (edit distance <= 2)
    if (editDistance(dLast, eLast) <= 1 && editDistance(dFirst, eFirst) <= 2) return true;
  }

  // Full name edit distance check (handles minor typos anywhere)
  const dnJoined = dParts.join(' ');
  const enJoined = eParts.join(' ');
  if (editDistance(dnJoined, enJoined) <= 3) return true;

  return false;
}

// Get players we drafted from a specific college
function getDraftedPlayersFromCollege(college) {
  const players = [];
  state.teams.forEach((t, ti) => {
    t.players.forEach(p => {
      if (p.college === college) {
        players.push({ ...p, teamName: t.name, teamIdx: ti });
      }
    });
  });
  return players;
}

// Fetch tournament scoreboard for a date range
async function fetchScoreboardForDates(dates) {
  const allEvents = [];
  const seenIds = new Set();
  for (const dateStr of dates) {
    try {
      const url = `${ESPN_SCOREBOARD}?dates=${dateStr}&groups=100&limit=100`;
      const resp = await fetch(url);
      if (!resp.ok) continue;
      const data = await resp.json();
      for (const ev of (data.events || [])) {
        if (!seenIds.has(ev.id)) {
          seenIds.add(ev.id);
          allEvents.push(ev);
        }
      }
    } catch(e) { /* skip failed day */ }
  }
  return allEvents;
}

// Get date strings from tournament start through today
function getTournamentDates() {
  const start = new Date(TOURNAMENT_START + 'T00:00:00');
  const today = new Date();
  today.setHours(23,59,59); // include all of today
  const dates = [];
  for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
    dates.push(d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0'));
  }
  return dates;
}

// Get just today + yesterday
function getRecentDates() {
  const dates = [];
  const today = new Date();
  for (let i = 0; i <= 1; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    dates.push(d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0'));
  }
  return dates;
}

// Fetch boxscore for a specific game
async function fetchBoxscore(gameId) {
  try {
    const url = `${ESPN_SUMMARY}?event=${gameId}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`Summary HTTP ${resp.status}`);
    return await resp.json();
  } catch (err) {
    addLog(`Boxscore error (${gameId}): ${err.message}`);
    return null;
  }
}

// Extract player stats from a boxscore for a given game
function extractPlayerStats(game, data) {
  const results = []; // { draftName, pts, college }
  if (!data?.boxscore) return results;

  const espnPlayers = data.boxscore.players || [];
  for (const teamPlayers of espnPlayers) {
    const matchedCollege = matchESPNTeam({ team: teamPlayers.team });
    if (!matchedCollege || !game.relevantColleges.includes(matchedCollege)) continue;

    const draftedPlayers = getDraftedPlayersFromCollege(matchedCollege);
    const statistics = teamPlayers.statistics || [];

    for (const statGroup of statistics) {
      const rawLabels = statGroup.labels || statGroup.names || [];
      const labels = rawLabels.map(l => l.toLowerCase());
      const ptsIdx = labels.indexOf('pts');
      if (ptsIdx === -1) continue;

      const athletes = statGroup.athletes || [];
      for (const athlete of athletes) {
        const espnPlayerName = athlete.athlete?.displayName || athlete.athlete?.shortName || '';
        for (const draftPlayer of draftedPlayers) {
          if (namesMatch(draftPlayer.name, espnPlayerName)) {
            const stats = athlete.stats || [];
            const pts = parseInt(stats[ptsIdx]) || 0;
            results.push({ draftName: draftPlayer.name, pts, college: matchedCollege });
            break;
          }
        }
      }
    }
  }
  return results;
}

// Build game info from ESPN event data
function buildGameInfo(event) {
  const draftedColleges = getDraftedColleges();
  const comp = (event.competitions || [])[0];
  if (!comp) return null;

  const gameInfo = {
    id: event.id,
    name: event.name || '',
    shortName: event.shortName || '',
    status: comp.status?.type?.name || 'unknown',
    statusDetail: comp.status?.type?.detail || '',
    clock: comp.status?.displayClock || '',
    period: comp.status?.period || 0,
    round: detectRound(event, comp),
    date: event.date || '',
    teams: [],
    relevantColleges: []
  };

  let isRelevant = false;
  for (const competitor of (comp.competitors || [])) {
    const collegeName = matchESPNTeam(competitor);
    gameInfo.teams.push({
      espnName: competitor.team?.displayName || competitor.team?.location || 'Unknown',
      abbreviation: competitor.team?.abbreviation || '',
      score: parseInt(competitor.score) || 0,
      homeAway: competitor.homeAway || '',
      winner: competitor.winner || false,
      draftCollege: collegeName,
    });
    if (collegeName && draftedColleges.has(collegeName)) {
      isRelevant = true;
      gameInfo.relevantColleges.push(collegeName);
    }
  }
  return isRelevant ? gameInfo : null;
}

// Main live update cycle
async function doLiveUpdate() {
  if (!liveEnabled) return;

  addLog('Starting live update...');
  lastFetchTime = new Date();

  // Initialize processedGames if missing (backward compat)
  if (!state.processedGames) state.processedGames = {};

  // Decide scan range: full tournament scan on first load or every 30 min, otherwise just recent
  const now = Date.now();
  const needsFullScan = !state.lastFullScan || (now - new Date(state.lastFullScan).getTime()) > 30 * 60 * 1000;
  const datesToScan = needsFullScan ? getTournamentDates() : getRecentDates();
  addLog(needsFullScan ? `Full tournament scan (${datesToScan.length} days)` : `Quick scan (today + yesterday)`);

  const events = await fetchScoreboardForDates(datesToScan);
  if (needsFullScan) {
    state.lastFullScan = new Date().toISOString();
  }

  // Build game info for all relevant games
  liveGames = [];
  livePlayerStats = {};

  for (const event of events) {
    const gameInfo = buildGameInfo(event);
    if (gameInfo) liveGames.push(gameInfo);
  }

  addLog(`${liveGames.length} games involve drafted players`);

  // Restore locked scores from processed games into livePlayerStats for display
  for (const [gameId, processed] of Object.entries(state.processedGames)) {
    for (const [playerName, pts] of Object.entries(processed.scores || {})) {
      livePlayerStats[playerName] = {
        pts,
        gameStatus: 'final',
        gameClock: 'Final',
        round: processed.round,
        locked: true
      };
    }
  }

  // Fetch boxscores only for games that need it
  const gamesToFetch = liveGames.filter(g => {
    // Already processed and locked — skip
    if (state.processedGames[g.id]) return false;
    // Only fetch if in progress or final
    return ['STATUS_IN_PROGRESS', 'STATUS_FINAL', 'STATUS_HALFTIME', 'STATUS_END_PERIOD'].includes(g.status);
  });

  addLog(`Fetching ${gamesToFetch.length} boxscores (${Object.keys(state.processedGames).length} already locked)`);

  const boxscores = await Promise.all(
    gamesToFetch.map(game => fetchBoxscore(game.id).then(data => ({ game, data })))
  );

  let matchedPlayers = 0;
  for (const { game, data } of boxscores) {
    if (!data) continue;

    const playerResults = extractPlayerStats(game, data);
    const round = game.round;

    for (const { draftName, pts, college } of playerResults) {
      addLog(`MATCHED: "${draftName}" → ${pts} pts (Round ${round}, game ${game.id})`);
      matchedPlayers++;

      // Write score to the correct round
      if (!state.scores[draftName]) state.scores[draftName] = {};
      state.scores[draftName][round] = pts;

      // Update live display
      livePlayerStats[draftName] = {
        pts,
        gameStatus: game.status === 'STATUS_FINAL' ? 'final' : 'in_progress',
        gameClock: game.status === 'STATUS_FINAL' ? 'Final' :
                   game.status === 'STATUS_HALFTIME' ? 'Halftime' :
                   `${game.clock} - ${game.period === 1 ? '1st' : game.period === 2 ? '2nd' : 'OT'}`,
        opponent: game.teams.find(t => t.draftCollege !== college)?.espnName || '?',
        gameScore: game.teams.map(t => `${t.abbreviation} ${t.score}`).join(' - '),
        round
      };
    }

    // Handle eliminations and lock final games
    if (game.status === 'STATUS_FINAL') {
      // Lock this game — won't re-fetch next time
      const lockedScores = {};
      for (const { draftName, pts } of playerResults) {
        lockedScores[draftName] = pts;
      }
      const eliminatedColleges = [];
      for (const team of game.teams) {
        if (team.draftCollege && !team.winner && !state.eliminated[team.draftCollege]) {
          state.eliminated[team.draftCollege] = round;
          eliminatedColleges.push(team.draftCollege);
          addLog(`AUTO-ELIMINATED: ${team.draftCollege} (Round ${round})`);
        }
      }
      state.processedGames[game.id] = {
        round,
        scores: lockedScores,
        eliminated: eliminatedColleges,
        date: game.date
      };
    }
  }

  addLog(`Matched ${matchedPlayers} players | ${Object.keys(state.processedGames).length} games locked`);
  saveState();
  render();
  updateLiveIndicator();
}

function addLog(msg) {
  const time = new Date().toLocaleTimeString();
  fetchLog.unshift({ time, msg });
  if (fetchLog.length > 50) fetchLog.length = 50;
}

// ===== LIVE TOGGLE =====
function toggleLive() {
  liveEnabled = !liveEnabled;
  updateLiveIndicator();

  if (liveEnabled) {
    doLiveUpdate(); // immediate first fetch
    liveInterval = setInterval(doLiveUpdate, 30000); // every 30s
    showToast('Live updates ON — refreshing every 30s');
  } else {
    if (liveInterval) clearInterval(liveInterval);
    liveInterval = null;
    showToast('Live updates OFF');
  }
}

function updateLiveIndicator() {
  const el = document.getElementById('liveToggle');
  const label = document.getElementById('liveLabel');
  if (liveEnabled) {
    el.className = 'live-indicator active';
    const liveCount = Object.values(livePlayerStats).filter(s => s.gameStatus === 'in_progress').length;
    label.textContent = liveCount > 0 ? `LIVE (${liveCount} playing)` : 'LIVE ON';
  } else {
    el.className = 'live-indicator inactive';
    label.textContent = 'LIVE OFF';
  }
}

// ===== TABS =====
let currentTab = 'standings';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  render();
}

function render() {
  const c = document.getElementById('content');
  switch(currentTab) {
    case 'standings': c.innerHTML = renderStandings(); break;
    case 'live': c.innerHTML = renderLive(); break;
    case 'teams': c.innerHTML = renderTeams(); break;
    case 'players': c.innerHTML = renderPlayers(); break;
    case 'colleges': c.innerHTML = renderColleges(); break;
    case 'eliminated': c.innerHTML = renderEliminated(); break;
    case 'draft': c.innerHTML = renderDraft(); break;
  }
}

function renderGameCard(game) {
  const isLive = game.status === 'STATUS_IN_PROGRESS' || game.status === 'STATUS_HALFTIME' || game.status === 'STATUS_END_PERIOD';
  const isFinal = game.status === 'STATUS_FINAL';
  const home = game.teams.find(t => t.homeAway === 'home') || game.teams[0];
  const away = game.teams.find(t => t.homeAway === 'away') || game.teams[1];

  function teamRow(t) {
    const isDrafted = !!t.draftCollege;
    return `
      <div class="game-score-row">
        <div>
          <span class="game-team-name" style="${isDrafted ? 'color:var(--accent);' : ''}">${t.espnName}</span>
          ${isDrafted ? `<span class="live-pts-badge">${getDraftedPlayersFromCollege(t.draftCollege).length} drafted</span>` : ''}
          ${isFinal && t.winner ? ' ✓' : ''}
          ${isFinal && !t.winner && isDrafted ? ' <span style="color:var(--red);font-size:11px;">ELIMINATED</span>' : ''}
        </div>
        <div class="game-team-score" style="${isFinal && t.winner ? 'color:var(--green);' : ''}">${t.score}</div>
      </div>
    `;
  }

  return `
    <div class="game-card ${isLive ? 'game-card-live' : ''}">
      ${away ? teamRow(away) : ''}
      ${home ? teamRow(home) : ''}
      <div class="game-status ${isLive ? 'game-status-live' : ''}">
        ${isLive ? `${game.clock} - ${game.period === 1 ? '1st Half' : game.period === 2 ? '2nd Half' : 'OT'}` : ''}
        ${isFinal ? 'Final' : ''}
        ${game.status === 'STATUS_SCHEDULED' ? game.statusDetail || 'Scheduled' : ''}
        ${game.status === 'STATUS_HALFTIME' ? 'Halftime' : ''}
      </div>
    </div>
  `;
}

        <div class="card ${liveCount > 0 ? 'card-live' : ''}">
          <div class="stat-label">Currently Playing</div>
          <div class="stat-value" style="font-size:32px;margin-top:8px;color:${liveCount > 0 ? 'var(--green)' : 'var(--muted)'};">${liveCount}</div>
          ${lastFetchTime ? `<div style="color:var(--muted);font-size:11px;margin-top:4px;">Updated ${lastFetchTime.toLocaleTimeString()}</div>` : ''}
        </div>
      ` : ''}
    </div>
    <div class="card">
      <h2>Team Standings</h2>
      <table>
        <tr><th>#</th><th>Team</th><th>Active</th><th style="text-align:right">Points</th></tr>
        ${sorted.map((t,i) => `
          <tr>
            <td class="rank">${i+1}</td>
            <td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TEAM_COLORS[t.idx]};margin-right:8px;"></span>${t.name}</td>
            <td><span style="color:var(--green)">${getActivePlayers(t).length}</span>/<span style="color:var(--muted)">${t.players.length}</span></td>
            <td class="pts" style="text-align:right">${getTeamScore(t)}</td>
          </tr>
        `).join('')}
      </table>
    </div>
    <div class="card" style="margin-top:20px;">
      <h2>Top 15 Scorers</h2>
      <table>
        <tr><th>#</th><th>Player</th><th>College</th><th>Fantasy Team</th><th>Status</th><th style="text-align:right">Points</th></tr>
        ${getTopScorers().slice(0,15).map((p,i) => {
          const live = livePlayerStats[p.name];
          return `
          <tr class="${isPlayerEliminated(p) ? 'eliminated-row' : ''}">
            <td class="rank">${i+1}</td>
            <td>${p.name} ${live?.gameStatus === 'in_progress' ? '<span class="badge badge-live">LIVE</span>' : ''}</td>
            <td class="college-team">${p.college}</td>
            <td><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${TEAM_COLORS[p.teamIdx]};margin-right:6px;"></span>${p.teamName}</td>
            <td>${isPlayerEliminated(p) ? '<span class="badge badge-eliminated">OUT</span>' : '<span class="badge badge-active">ACTIVE</span>'}</td>
            <td class="pts" style="text-align:right;${live?.gameStatus === 'in_progress' ? 'color:var(--green);' : ''}">${getPlayerScore(p.name)}${live?.gameStatus === 'in_progress' ? '<span class="live-pts-badge">LIVE</span>' : ''}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>
  `;
}

// ===== TEAMS =====
function renderTeams() {
  return `<div class="grid-2">
    ${state.teams.map((t,ti) => {
      const hasLivePlayers = t.players.some(p => livePlayerStats[p.name]?.gameStatus === 'in_progress');
      return `
      <div class="card ${hasLivePlayers ? 'card-live' : ''}">
        <div class="team-header">
          <h2><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${TEAM_COLORS[ti]};margin-right:8px;"></span>${t.name} ${hasLivePlayers ? '<span class="badge badge-live">LIVE</span>' : ''}</h2>
          <div class="team-total">${getTeamScore(t)} pts</div>
        </div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:12px;">${getActivePlayers(t).length} active / ${t.players.filter(p=>isPlayerEliminated(p)).length} eliminated</div>
        <table>
          <tr><th>Player</th><th>College</th><th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>R6</th><th style="text-align:right">Total</th></tr>
          ${t.players.map(p => {
            const live = livePlayerStats[p.name];
            return `
            <tr class="${isPlayerEliminated(p) ? 'eliminated-row' : ''}">
              <td>${p.name} ${live?.gameStatus === 'in_progress' ? '<span class="badge badge-live">LIVE</span>' : ''}</td>
              <td class="college-team">${p.college}</td>
              ${[1,2,3,4,5,6].map(r => `<td style="text-align:center;font-variant-numeric:tabular-nums;${live?.gameStatus === 'in_progress' && r == state.currentRound ? 'color:var(--green);font-weight:700;' : ''}">${getPlayerScore(p.name,r) || '—'}</td>`).join('')}
              <td class="pts" style="text-align:right">${getPlayerScore(p.name)}</td>
            </tr>`;
          }).join('')}
          <tr style="font-weight:700;border-top:2px solid var(--border);">
            <td colspan="2">Total</td>
            ${[1,2,3,4,5,6].map(r => `<td style="text-align:center;">${t.players.reduce((s,p) => s + getPlayerScore(p.name,r), 0)}</td>`).join('')}
            <td class="pts" style="text-align:right">${getTeamScore(t)}</td>
          </tr>
        </table>
      </div>`;
    }).join('')}
  </div>`;
}

// ===== PLAYERS =====
function renderPlayers() {
  const all = getTopScorers();
  const searchTerm = document.getElementById('globalSearch')?.value?.toLowerCase() || '';
  const filtered = searchTerm ? all.filter(p =>
    p.name.toLowerCase().includes(searchTerm) ||
    p.college.toLowerCase().includes(searchTerm) ||
    p.teamName.toLowerCase().includes(searchTerm)
  ) : all;

  return `<div class="card">
    <h2>All Players (${filtered.length})</h2>
    <table>
      <tr><th>#</th><th>Player</th><th>College</th><th>Fantasy Team</th><th>Status</th>
      <th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>R6</th><th style="text-align:right">Total</th></tr>
      ${filtered.map((p,i) => {
        const live = livePlayerStats[p.name];
        return `
        <tr class="${isPlayerEliminated(p) ? 'eliminated-row' : ''}">
          <td class="rank">${i+1}</td>
          <td>${p.name} ${live?.gameStatus === 'in_progress' ? '<span class="badge badge-live">LIVE</span>' : ''}</td>
          <td class="college-team">${p.college}</td>
          <td><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${TEAM_COLORS[p.teamIdx]};margin-right:6px;"></span>${p.teamName}</td>
          <td>${isPlayerEliminated(p) ? '<span class="badge badge-eliminated">OUT</span>' : live?.gameStatus === 'in_progress' ? '<span class="badge badge-live">PLAYING</span>' : '<span class="badge badge-active">ACTIVE</span>'}</td>
          ${[1,2,3,4,5,6].map(r => `<td style="text-align:center;font-variant-numeric:tabular-nums;${live?.gameStatus === 'in_progress' && r == state.currentRound ? 'color:var(--green);font-weight:700;' : ''}">${getPlayerScore(p.name,r) || '—'}</td>`).join('')}
          <td class="pts" style="text-align:right">${getPlayerScore(p.name)}</td>
        </tr>`;
      }).join('')}
    </table>
  </div>`;
}

// ===== COLLEGES =====
function renderColleges() {
  const colleges = {};
  state.teams.forEach((t,ti) => {
    t.players.forEach(p => {
      if (!colleges[p.college]) colleges[p.college] = { players: [], totalPts: 0 };
      const entry = { ...p, teamName: t.name, teamIdx: ti };
      colleges[p.college].players.push(entry);
      colleges[p.college].totalPts += getPlayerScore(p.name);
    });
  });
  const sorted = Object.entries(colleges).sort((a,b) => b[1].totalPts - a[1].totalPts);

  return `<div class="grid-2">
    ${sorted.map(([college, data]) => `
      <div class="card" style="${isEliminated(college) ? 'opacity:0.5;border-color:var(--red);' : ''}">
        <div class="team-header">
          <h2>${college} ${isEliminated(college) ? '<span class="badge badge-eliminated">ELIMINATED</span>' : '<span class="badge badge-active">ACTIVE</span>'}</h2>
          <div class="team-total">${data.totalPts} pts</div>
        </div>
        <div style="color:var(--muted);font-size:12px;margin-bottom:8px;">${data.players.length} drafted player${data.players.length>1?'s':''}</div>
        <table>
          <tr><th>Player</th><th>Fantasy Team</th><th style="text-align:right">Points</th></tr>
          ${data.players.map(p => `
            <tr>
              <td>${p.name} ${livePlayerStats[p.name]?.gameStatus === 'in_progress' ? '<span class="badge badge-live">LIVE</span>' : ''}</td>
              <td><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${TEAM_COLORS[p.teamIdx]};margin-right:6px;"></span>${p.teamName}</td>
              <td class="pts" style="text-align:right">${getPlayerScore(p.name)}</td>
            </tr>
          `).join('')}
        </table>
      </div>
    `).join('')}
  </div>`;
}

// ===== ELIMINATIONS =====
function renderEliminated() {
  const colleges = getAllColleges();
  const elimColleges = colleges.filter(c => isEliminated(c));
  const activeColleges = colleges.filter(c => !isEliminated(c));

  return `
    <div class="grid-2" style="margin-bottom:20px;">
      <div class="card">
        <div class="stat-label">Active College Teams</div>
        <div class="stat-value" style="font-size:32px;margin-top:8px;color:var(--green)">${activeColleges.length}</div>
      </div>
      <div class="card">
        <div class="stat-label">Eliminated College Teams</div>
        <div class="stat-value" style="font-size:32px;margin-top:8px;color:var(--red)">${elimColleges.length}</div>
      </div>
    </div>
    <div class="card" style="margin-bottom:20px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h2>Manage Eliminations</h2>
        <span style="color:var(--muted);font-size:12px;">Losing teams are auto-eliminated when live updates are on</span>
      </div>
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Click a college to toggle its elimination status. All players from that team will be marked as eliminated.</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${colleges.map(c => `
          <button class="btn ${isEliminated(c) ? 'btn-danger' : ''}" onclick="toggleElimination('${c.replace(/'/g, "\\'")}')" style="${isEliminated(c) ? 'text-decoration:line-through;' : ''}">
            ${c} ${isEliminated(c) ? '✕' : ''}
          </button>
        `).join('')}
      </div>
    </div>
    ${elimColleges.length > 0 ? `
    <div class="card">
      <h2>Eliminated Teams & Affected Players</h2>
      <table>
        <tr><th>College</th><th>Round Eliminated</th><th>Affected Players</th><th>Fantasy Teams Affected</th></tr>
        ${elimColleges.map(c => {
          const players = [];
          state.teams.forEach((t,ti) => t.players.forEach(p => {
            if (p.college === c) players.push({ ...p, teamName: t.name, teamIdx: ti });
          }));
          return `<tr>
            <td style="font-weight:700;color:var(--red)">${c}</td>
            <td>Round ${state.eliminated[c]}</td>
            <td>${players.map(p => p.name).join(', ')}</td>
            <td>${[...new Set(players.map(p => p.teamName))].join(', ')}</td>
          </tr>`;
        }).join('')}
      </table>
    </div>` : ''}
  `;
}

function toggleElimination(college) {
  if (state.eliminated[college]) {
    delete state.eliminated[college];
    showToast(`${college} restored to active`);
  } else {
    state.eliminated[college] = state.currentRound;
    showToast(`${college} eliminated in Round ${state.currentRound}`);
  }
  saveState();
  render();
}

// ===== DRAFT BOARD =====
function renderDraft() {
  const rounds = [1,2,3,4,5,6,7,8];
  return `<div class="card">
    <h2>Draft Board</h2>
    <div style="overflow-x:auto;">
      <table>
        <tr>
          <th>Round</th>
          ${state.teams.map((t,i) => `<th><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${TEAM_COLORS[i]};margin-right:4px;"></span>${t.name}</th>`).join('')}
        </tr>
        ${rounds.map(r => `
          <tr>
            <td class="rank">${r}</td>
            ${state.teams.map(t => {
              const p = t.players[r-1];
              if (!p) return '<td>—</td>';
              const live = livePlayerStats[p.name];
              return `<td class="${isPlayerEliminated(p) ? 'eliminated-row' : ''}">
                ${p.name}${live?.gameStatus === 'in_progress' ? ' <span class="badge badge-live">' + live.pts + 'pts</span>' : ''}
                <br><span class="college-team">${p.college}</span>
              </td>`;
            }).join('')}
          </tr>
        `).join('')}
      </table>
    </div>
  </div>`;
}

// ===== SCORE MODAL =====
let selectedRound = 1;

function openScoreModal() {
  selectedRound = state.currentRound;
  document.getElementById('scoreModal').classList.add('open');
  renderRoundSelector();
  renderTeamFilterDropdown();
  renderScoreEntries();
}

function closeScoreModal() {
  document.getElementById('scoreModal').classList.remove('open');
}

function renderRoundSelector() {
  document.getElementById('roundSelector').innerHTML = [1,2,3,4,5,6].map(r =>
    `<button class="round-btn ${r === selectedRound ? 'active' : ''}" onclick="selectRound(${r})">${ROUND_NAMES[r]}</button>`
  ).join('');
}

function selectRound(r) {
  selectedRound = r;
  state.currentRound = r;
  saveState();
  renderRoundSelector();
  renderScoreEntries();
}

function renderTeamFilterDropdown() {
  document.getElementById('scoreTeamFilter').innerHTML = `<option value="all">All Teams</option>` +
    state.teams.map((t,i) => `<option value="${i}">${t.name}</option>`).join('');
}

function renderScoreEntries() {
  const container = document.getElementById('scoreEntries');
  const filterVal = document.getElementById('scoreTeamFilter').value;
  let teams = filterVal === 'all' ? state.teams.map((t,i) => ({...t, idx:i})) : [{ ...state.teams[filterVal], idx: parseInt(filterVal) }];

  container.innerHTML = teams.map(t => `
    <div style="margin-bottom:16px;">
      <h3 style="color:${TEAM_COLORS[t.idx]};font-size:14px;font-weight:700;margin-bottom:8px;">${t.name}</h3>
      ${t.players.filter(p => !isPlayerEliminated(p)).map(p => {
        const live = livePlayerStats[p.name];
        return `
        <div style="display:flex;align-items:center;gap:12px;padding:6px 0;">
          <span style="flex:1;font-size:13px;">${p.name} <span class="college-team">(${p.college})</span>
            ${live ? `<span class="live-pts-badge">ESPN: ${live.pts}pts ${live.gameClock}</span>` : ''}
          </span>
          <input type="number" min="0" id="score_${p.name.replace(/[^a-zA-Z0-9]/g,'_')}" value="${getPlayerScore(p.name, selectedRound)}" />
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

function saveScores() {
  state.teams.forEach(t => {
    t.players.forEach(p => {
      if (isPlayerEliminated(p)) return;
      const input = document.getElementById('score_' + p.name.replace(/[^a-zA-Z0-9]/g,'_'));
      if (input) {
        if (!state.scores[p.name]) state.scores[p.name] = {};
        state.scores[p.name][selectedRound] = parseInt(input.value) || 0;
      }
    });
  });
  saveState();
  closeScoreModal();
  render();
  showToast('Scores saved!');
}

// ===== SEARCH =====
function handleSearch() {
  if (currentTab === 'players') render();
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mm_draft_2026_data.json';
  a.click();
  showToast('Data exported!');
}

function importData() {
  document.getElementById('fileInput').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      state = JSON.parse(ev.target.result);
      saveState();
      render();
      showToast('Data imported!');
    } catch(err) {
      showToast('Import failed: invalid JSON');
    }
  };
  reader.readAsText(file);
}

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== INIT =====
// Ensure state has processedGames (backward compat with older localStorage)
if (!state.processedGames) { state.processedGames = {}; saveState(); }
if (!state.lastFullScan) { state.lastFullScan = null; }

// One-time v2 migration: clear false eliminations from old includes() matching bug
if (!state._v2migrated) {
  // Clear any eliminations that came from bad matching (South Florida→Florida, Arkansas→Kansas)
  // Users can re-eliminate manually or let the live feed re-detect from final games
  state.eliminated = {};
  state.processedGames = {};
  state.lastFullScan = null;
  state._v2migrated = true;
  saveState();
}

render();
</script>
</body>
</html>
